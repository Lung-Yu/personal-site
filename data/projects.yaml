# 新增專案：year 為數字或年份區間字串；tags 選填（不需翻譯的技術詞彙）；url 選填（公開 repo 才填）。
# 未標 url 的皆為私有 repo，頁尾註明原始碼可於面談時提供。
# featured: true 的會出現在首頁精選，全部專案（含未精選）都在 /projects/ 完整列表。
- id: ai-tab-organizer
  featured: true
  title:
    zh: AI 分頁整理器
    en: AI Tab Organizer
  description:
    zh: 已上架 Chrome Web Store 的擴充功能（v1.4.0），以 AI 智慧分類、去重複並整理瀏覽器分頁；支援 OpenAI、Anthropic Claude 與 Google Gemini，本地優先、自帶金鑰，注重隱私。
    en: A published Chrome extension (v1.4.0) that uses AI to intelligently categorize, deduplicate, and organize browser tabs; supports OpenAI, Anthropic Claude, and Google Gemini, local-first with bring-your-own-key, privacy-conscious by design.
