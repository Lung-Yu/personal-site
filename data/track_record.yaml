- id: polisana
  title:
    zh: Polisana 弱點管理平台
    en: Polisana Vulnerability Management Platform
  description:
    zh: 自主研發的 AI-native 弱點管理平台，微服務架構；基礎設施由 On-demand GKE 演進為 Terraform 全 IaC 化管理，提升可靠性與可擴展性。
