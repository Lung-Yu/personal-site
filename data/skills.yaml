# 技術能力分類：新增分類複製格式即可。category/items 需中英雙語，items 為陣列。
- id: security
  category:
    zh: 資訊安全
    en: Security
  items:
    zh:
      - 資安架構與治理
      - SAST / DAST / SCA（Fortify · WebInspect · Snyk · SonarQube）
      - 弱點管理與風險評估
      - 應用程式安全測試與碼審
      - 滲透測試（CEH）
      - ISO 27001:2022 主導稽核員
      - ISMS 政策與合規
      - 事件應變與威脅分析
      - SBOM（CycloneDX · SPDX）
    en:
      - Security Architecture & Governance
      - SAST / DAST / SCA (Fortify · WebInspect · Snyk · SonarQube)
      - Vulnerability Management & Risk Assessment
      - Application Security Testing & Code Review
      - Penetration Testing (CEH)
      - ISO 27001:2022 Lead Auditor
      - ISMS Policy & Compliance
      - Incident Response & Threat Analysis
      - SBOM (CycloneDX · SPDX)

