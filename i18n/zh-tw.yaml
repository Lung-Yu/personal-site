tools: 工具
tools_intro: 三個純瀏覽器端執行的資安小工具——不會把任何內容送出，關閉分頁就沒有留下任何紀錄。設計理念呼應本站服務：解碼與檢查，而非取代人工判讀。
tools_list_note: 原始碼皆為本站一部分，於面談時可一併說明實作細節。
tool_privacy_note: 所有運算都在您的瀏覽器內完成，本站不會接收、記錄或傳輸您輸入的任何內容。
jwt_input_label: JWT
jwt_placeholder: 貼上 eyJhbGciOi... 格式的 JWT
jwt_decode: 解碼
jwt_clear: 清除
jwt_hint: 本工具僅解析 Base64 內容並檢查結構，不驗證簽章——沒有金鑰就無法驗證真偽，任何人取得 token 都能看到這裡顯示的內容。
jwt_header_label: Header
jwt_payload_label: Payload
jwt_findings_label: 檢查結果
jwt_no_findings: 未發現本工具已知的結構性風險（不代表簽章有效或內容可信）。
jwt_err_format: 格式錯誤：JWT 應為以「.」分隔的 3 段內容（Header.Payload.Signature）。
jwt_err_json: 內容無法解析為 JSON，可能不是有效的 JWT。
jwt_f_alg_none_title: 演算法為 none
jwt_f_alg_none_desc: 此 token 宣告不使用簽章演算法（alg:none），任何人都能任意偽造內容。伺服器端務必明確拒絕 alg=none 的 token。
jwt_f_no_exp_title: 缺少到期時間（exp）
jwt_f_no_exp_desc: 此 token 沒有 exp 宣告，一旦外洩就會永久有效，無法透過時間自然失效。
jwt_f_expired_title: token 已過期
jwt_f_expired_desc: exp 時間早於現在，此 token 依規範應已失效（僅供結構檢視參考）。
jwt_f_long_lived_title: 效期偏長
jwt_f_long_lived_desc: 有效期超過 30 天。若為存取權杖（access token），建議縮短效期並改用更新機制（refresh token）處理長期登入。
jwt_f_sensitive_title: Payload 疑似含敏感欄位
jwt_f_sensitive_desc: 偵測到疑似敏感的欄位名稱（{fields}）。JWT 的 payload 僅是 Base64 編碼，並未加密，任何人都能還原內容，不應放置密碼、金鑰等機敏資料。
jwt_f_hmac_title: 使用對稱式簽章演算法
jwt_f_hmac_desc: alg 為 {alg}，簽章與驗證共用同一把密鑰。若此密鑰曾出現在前端、行動裝置或公開程式碼中，token 就可能被偽造。
csp_input_label: CSP
csp_placeholder: "貼上 CSP 字串，例如：default-src 'none'; script-src 'self'"
csp_analyze: 分析
csp_clear: 清除
csp_hint: 僅在瀏覽器端解析字串，不會送出任何資料。可貼上 HTTP 標頭值或 <meta> 標籤的 content 內容。
csp_directives_label: 解析出的指令
csp_findings_label: 檢查結果
csp_no_findings: 未發現本工具已知的常見弱點設定。
csp_err_empty: 請先貼上 CSP 字串。
csp_f_unsafe_inline_title: 允許 unsafe-inline
csp_f_unsafe_inline_desc: "{directive} 含有 'unsafe-inline'，等同放棄 CSP 對內聯腳本／樣式類 XSS 的防護能力。"
csp_f_unsafe_eval_title: 允許 unsafe-eval
csp_f_unsafe_eval_desc: "{directive} 含有 'unsafe-eval'，允許 eval() 等動態程式碼執行，會擴大 XSS 可利用的範圍。"
csp_f_wildcard_title: 來源設定過於寬鬆
csp_f_wildcard_desc: "{directive} 允許任意來源（{source}），等於沒有限制載入來源。"
csp_f_no_object_src_title: 未設定 object-src
csp_f_no_object_src_desc: 未限制 object-src，外掛物件可能被用來繞過其他限制，建議明確設為 'none'。
csp_f_no_base_uri_title: 未設定 base-uri
csp_f_no_base_uri_desc: 未限制 base-uri，攻擊者插入的 <base> 標籤可能劫持相對路徑資源的載入位置，建議設為 'self' 或 'none'。
csp_f_no_frame_ancestors_title: 未設定 frame-ancestors
csp_f_no_frame_ancestors_desc: 頁面可能被嵌入 iframe 進行 Clickjacking，建議依需求設為 'none' 或 'self'。
csp_f_no_default_src_title: 未設定 default-src
csp_f_no_default_src_desc: 未列出的資源類型將回退為瀏覽器預設（通常不受限制），建議明確設定 default-src 作為安全基準。
csp_f_style_unsafe_inline_title: style-src 允許 unsafe-inline
csp_f_style_unsafe_inline_desc: 風險低於 script-src，但仍可能被用於 CSS 注入型的資料外洩攻擊。
csp_f_no_report_title: 未設定違規回報端點
csp_f_no_report_desc: 未設定 report-uri 或 report-to，CSP 違規事件不會被記錄，難以掌握政策實際的攔截效果。
csp_f_default_wildcard_title: default-src 來源過於寬鬆
csp_f_default_wildcard_desc: "default-src 允許任意來源（{source}）。沒有被更具體指令（如 img-src、connect-src、font-src）覆蓋的資源類型會直接套用這個寬鬆設定。"
stride_intro: 畫一張最簡單的資料流圖（DFD）：外部實體、流程、資料儲存、信任邊界，再用資料流把它們連起來。分析時會依照 STRIDE 方法論，針對每個元素套用對應的威脅類別——這是討論起點，不是完整的威脅建模，完整分析仍建議搭配人工複核（可參考 ThreatBoard 專案）。
stride_s: S — 偽冒（Spoofing）
stride_t: T — 竄改（Tampering）
stride_r: R — 否認（Repudiation）
stride_i: I — 資訊洩漏（Information Disclosure）
stride_d: D — 阻斷服務（Denial of Service）
stride_e: E — 權限提升（Elevation of Privilege）
