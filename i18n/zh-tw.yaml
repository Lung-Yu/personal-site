case_study: |
  **從對立到協作的三年**——金融機構導入自動化安全掃描時，最大的阻力往往不是技術，而是信任：工程團隊擔心安全關卡拖慢交付，資安團隊擔心妥協換來假象的安全感。這正是我在果核數位 Hacker Talk〈建構安全軟體從有效溝通開始〉與 DevOpsDays Taipei 2024〈DevOps + Sec：強力後盾還是麻煩製造者？〉分享的核心命題。

  面對一家金融上市機構的黑白箱自動化掃描需求，我們沒有選擇一次性上線，而是以三年漸進式導入取代——整合 WebInspect 與 Fortify SCA 進 Jenkins 分散掃描架構，並將簽核流程直接嵌入既有開發工作流，讓安全檢查成為交付節奏的一部分，而不是額外關卡。

  2025 年 9 月，第三階段（第二期）如期完成，是這場三年合作的最終里程碑。
