dfd_add_process: ＋ 流程
dfd_add_store: ＋ 資料儲存
dfd_add_boundary: ＋ 信任邊界
dfd_connect: 連接資料流
dfd_connect_hint: 連接模式：從來源節點按住拖曳到目的節點放開（Esc 取消）
dfd_delete: 刪除選取
dfd_clear: 清空畫布
dfd_analyze: 分析
dfd_copy: 複製清單
dfd_copied: 已複製
dfd_hint: 點上方按鈕新增元素、點畫布放置即可直接輸入名稱；拖曳可移動，點兩下可就地改標籤；按「連接資料流」後從來源節點按住拖曳到目的節點放開即可畫出資料流；信任邊界是一條可拖曳的分隔線，資料流是否跨越邊界會在分析時自動判斷。
dfd_placing_hint: 點畫布任一位置放置元素
dfd_label_entity: 外部實體
dfd_label_process: 流程
dfd_label_store: 資料儲存
dfd_label_boundary: 信任邊界
dfd_label_flow: 資料流
dfd_empty_hint: 畫布上還沒有元素——先新增至少一個流程與一條資料流，再按分析。
dfd_confirm_clear: 確定要清空畫布上的所有元素嗎？此動作無法復原。
dfd_dialog_confirm: 確定
dfd_dialog_cancel: 取消
dfd_result_label: 分析結果（依元素分組）
dfd_boundary_cross: 此資料流跨越信任邊界「{boundary}」：不能假設兩端已經驗證過彼此，應在邊界處重新驗證輸入與身份。
dfd_entity_s: 確認外部實體「{name}」的身份在進入系統邊界前已被正確驗證，而非單純信任其自稱的身份。
dfd_entity_r: 確認來自外部實體「{name}」的操作，有留下可歸責、不可被其自行竄改的紀錄。
dfd_process_s: 確認呼叫流程「{name}」的呼叫者身份已被驗證，而非僅憑內部網路位置判斷可信任。
dfd_process_t: 確認流程「{name}」對輸入資料做了完整性／合法性驗證，避免被竄改的輸入影響處理邏輯。
dfd_process_r: 確認流程「{name}」的關鍵動作有留下可歸責、不可被操作者自行竄改的紀錄。
dfd_process_i: 確認流程「{name}」不會意外洩漏內部結構、錯誤堆疊或除錯資訊。
dfd_process_d: 確認流程「{name}」有速率限制或資源配額，避免被單一來源耗盡。
dfd_process_e: 確認流程「{name}」的權限檢查在自己內部執行，而非依賴呼叫方自報的角色或前端隱藏。
dfd_store_t: 確認寫入「{name}」的資料有完整性保護，讀取時能偵測是否遭竄改。
dfd_store_r: 確認「{name}」的異動有稽核紀錄，且紀錄本身有防竄改機制。
dfd_store_i: 確認「{name}」的存取有欄位層級的授權控制，特別是機敏資料。
dfd_store_d: 確認「{name}」有容量或查詢複雜度限制，避免被耗盡或拖垮效能。
dfd_flow_t: 確認資料流「{name}」在傳輸中有完整性保護（如簽章、TLS），能偵測是否遭竄改。
dfd_flow_i: 確認資料流「{name}」傳輸的內容沒有超出必要範圍，且在傳輸中有機密性保護。
dfd_flow_d: 確認資料流「{name}」的來源端有速率限制，避免被用於對下游發動洪水攻擊。
case_study: |
  **從對立到協作的三年**——金融機構導入自動化安全掃描時，最大的阻力往往不是技術，而是信任：工程團隊擔心安全關卡拖慢交付，資安團隊擔心妥協換來假象的安全感。這正是我在果核數位 Hacker Talk〈建構安全軟體從有效溝通開始〉與 DevOpsDays Taipei 2024〈DevOps + Sec：強力後盾還是麻煩製造者？〉分享的核心命題。

  面對一家金融上市機構的黑白箱自動化掃描需求，我們沒有選擇一次性上線，而是以三年漸進式導入取代——整合 WebInspect 與 Fortify SCA 進 Jenkins 分散掃描架構，並將簽核流程直接嵌入既有開發工作流，讓安全檢查成為交付節奏的一部分，而不是額外關卡。

  2025 年 9 月，第三階段（第二期）如期完成，是這場三年合作的最終里程碑。
