dfd_result_label: Findings (grouped by element)
dfd_boundary_cross: "This data flow crosses the trust boundary \"{boundary}\": neither side can assume the other has already validated it — re-validate input and identity at the boundary."
dfd_entity_s: "Verify the external entity \"{name}\" is properly authenticated before crossing into the system, rather than trusted on its self-declared identity."
dfd_entity_r: "Verify actions from external entity \"{name}\" are attributably logged, in a record it can't alter itself."
dfd_process_s: "Verify callers of process \"{name}\" are authenticated, not just trusted based on internal network position."
dfd_process_t: "Verify process \"{name}\" validates the integrity/legitimacy of its input, so tampered input can't affect its logic."
dfd_process_r: "Verify key actions in process \"{name}\" are attributably logged, in a record the actor can't alter themselves."
dfd_process_i: "Verify process \"{name}\" doesn't accidentally leak internal structure, stack traces, or debug information."
dfd_process_d: "Verify process \"{name}\" has rate limiting or resource quotas so a single source can't exhaust it."
dfd_process_e: "Verify permission checks for process \"{name}\" run in the process itself, not on a role the caller self-reports or a hidden frontend control."
dfd_store_t: "Verify data written to \"{name}\" has integrity protection, so tampering can be detected on read."
dfd_store_r: "Verify changes to \"{name}\" are audit-logged, with tamper-resistance on the log itself."
dfd_store_i: "Verify access to \"{name}\" has field-level authorization, especially for sensitive data."
dfd_store_d: "Verify \"{name}\" has capacity or query-complexity limits so it can't be exhausted or degraded."
dfd_flow_t: "Verify data flow \"{name}\" has integrity protection in transit (signatures, TLS) so tampering can be detected."
dfd_flow_i: "Verify data flow \"{name}\" doesn't carry more than necessary and has confidentiality protection in transit."
dfd_flow_d: "Verify the source of data flow \"{name}\" has rate limiting, so it can't be used to flood downstream systems."
case_study: |
  **Three years, from friction to trust.** When financial institutions adopt automated security scanning, the real obstacle is rarely technical — it's trust. Engineering teams fear security gates will slow delivery; security teams fear compromise will buy only the illusion of safety. That's the core argument I made at Digicentre's Hacker Talk ("Building Secure Software Starts with Effective Communication") and DevOpsDays Taipei 2024 ("DevOps + Sec: Strong Support or Troublemakers?").

  For a listed financial institution's black/white-box automated scanning needs, we chose a 3-year phased rollout over a big-bang launch — integrating WebInspect and Fortify SCA into a Jenkins-based distributed scanning architecture, and embedding the approval workflow directly into the existing development process so security checks became part of the delivery cadence, not an extra gate.

  The final milestone — Phase 3, Stage 2 — shipped on schedule in September 2025, closing out the 3-year engagement.
