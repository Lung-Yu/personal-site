tools: Tools
tools_intro: "Three browser-only security tools — nothing is ever sent anywhere; close the tab and there's no trace. They're deliberately scoped: decoding and linting, not a substitute for human review."
tools_list_note: Source for all three lives in this site's repo; happy to walk through the implementation in a call.
tool_privacy_note: All processing happens in your browser. This site never receives, logs, or transmits anything you enter here.
jwt_input_label: JWT
jwt_placeholder: Paste a JWT in eyJhbGciOi... format
jwt_decode: Decode
jwt_clear: Clear
jwt_hint: This tool only parses the Base64 content and checks structure — it does not verify the signature. Without the key, authenticity can't be confirmed; anyone holding the token can see what's shown here.
jwt_header_label: Header
jwt_payload_label: Payload
jwt_findings_label: Findings
jwt_no_findings: No known structural risks found by this tool (this does not mean the signature is valid or the content is trustworthy).
jwt_err_format: Format error — a JWT should be 3 dot-separated segments (Header.Payload.Signature).
jwt_err_json: Content could not be parsed as JSON — this may not be a valid JWT.
jwt_f_alg_none_title: Algorithm is none
jwt_f_alg_none_desc: This token declares alg:none — no signature at all, so anyone can forge its contents. Servers must explicitly reject alg=none tokens.
jwt_f_no_exp_title: Missing expiry (exp)
jwt_f_no_exp_desc: No exp claim — if leaked, this token stays valid forever with no time-based expiry.
jwt_f_expired_title: Token has expired
jwt_f_expired_desc: exp is earlier than now — per spec this token should already be rejected (shown here for structural review only).
jwt_f_long_lived_title: Long lifetime
jwt_f_long_lived_desc: Validity exceeds 30 days. If this is an access token, consider a shorter lifetime paired with a refresh-token flow instead.
jwt_f_sensitive_title: Payload may contain sensitive fields
jwt_f_sensitive_desc: Field names that look sensitive were detected ({fields}). A JWT payload is only Base64-encoded, not encrypted — anyone can decode it, so it shouldn't hold passwords, secrets, or similar data.
jwt_f_hmac_title: Symmetric signing algorithm
jwt_f_hmac_desc: alg is {alg} — signing and verification share one secret key. If that key ever appeared in frontend code, a mobile app, or a public repo, tokens could be forged.
csp_input_label: CSP
csp_placeholder: "Paste a CSP string, e.g.: default-src 'none'; script-src 'self'"
csp_analyze: Analyze
csp_clear: Clear
csp_load_sample: Load sample
csp_hint: Parsed entirely in your browser. Paste either the raw HTTP header value or a <meta> tag's content attribute.
csp_directives_label: Parsed directives
csp_findings_label: Findings
csp_no_findings: No known common weaknesses found by this tool.
csp_err_empty: Paste a CSP string first.
csp_template_title: Suggested starter template
csp_template_hint: "Start strict and loosen only what your app actually needs (e.g. the specific CDN or API domains you use) — it's easier to reason about than tightening a loose policy later."
csp_template_copy: Copy template
csp_fixed_title: Suggested fixed version
csp_fixed_hint: Auto-generated from the findings on the left — high-risk settings removed, common gaps filled in. Review before use in case it blocks resources your site actually needs.
csp_f_unsafe_inline_title: Allows unsafe-inline
csp_f_unsafe_inline_desc: "{directive} includes 'unsafe-inline', meaning the browser will run any inline script/style in the page regardless of its source. This gives up CSP's protection against inline XSS entirely — if an attacker can inject a <script> tag or style attribute, they can run arbitrary code."
csp_f_unsafe_eval_title: Allows unsafe-eval
csp_f_unsafe_eval_desc: "{directive} includes 'unsafe-eval', meaning the page can run dynamically-generated code via eval(), new Function(), string arguments to setTimeout, etc. This lets an XSS attacker run more complex payloads that are harder for static scanners to catch."
csp_f_wildcard_title: Overly permissive source
csp_f_wildcard_desc: "{directive} allows any origin ({source}), meaning the browser won't restrict where this resource type loads from — if the page is ever tricked into loading a script from a malicious domain, CSP won't stop it."
csp_f_no_object_src_title: object-src not set
csp_f_no_object_src_desc: object-src is unrestricted, meaning plugin content like <object>, <embed>, and <applet> has no source restriction — it could be used to load Flash or other plugin content that bypasses script-src.
csp_f_no_base_uri_title: base-uri not set
csp_f_no_base_uri_desc: base-uri is unrestricted, meaning an attacker who can inject a <base> tag can change which origin every relative-path resource (scripts, styles, links) actually loads from — effectively hijacking the rest of the page's resource sources.
csp_f_no_frame_ancestors_title: frame-ancestors not set
csp_f_no_frame_ancestors_desc: frame-ancestors is unrestricted, meaning any site can embed this page in an iframe — a user could be tricked into clicking on page elements hidden inside another site (clickjacking) without realizing it.
csp_f_no_default_src_title: default-src not set
csp_f_no_default_src_desc: default-src is the fallback for any directive not explicitly listed. Without it, resource types not covered by a specific directive fall back to the browser default (usually unrestricted) — the actual coverage is narrower than it looks.
csp_f_style_unsafe_inline_title: style-src allows unsafe-inline
csp_f_style_unsafe_inline_desc: Lower risk than script-src's unsafe-inline, but an attacker can still use injected CSS (e.g. background-image with attribute selectors) to encode sensitive page data into an outbound request, exfiltrating it.
csp_f_no_report_title: No violation reporting endpoint
csp_f_no_report_desc: Neither report-uri nor report-to is set, meaning violations the browser blocks are never logged anywhere — there's no way to know what the policy is actually catching, or whether it's breaking legitimate resources.
csp_f_default_wildcard_title: default-src is overly permissive
csp_f_default_wildcard_desc: "default-src allows any origin ({source}). Any resource type not overridden by a more specific directive (img-src, connect-src, font-src, etc.) inherits this wide-open setting — the actual exposure is often wider than it looks."
stride_intro: "Draw the simplest possible data flow diagram (DFD): external entities, processes, data stores, and a trust boundary, connected by data flows. Analysis walks each element using the STRIDE methodology's applicability table. This is a conversation starter, not a full threat model — real analysis still needs human review (see the ThreatBoard project)."
