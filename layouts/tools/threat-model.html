{{ define "main" }}
<section class="reveal">
  <p class="eyebrow">{{ .Title }}</p>
  <p class="prose">{{ i18n "stride_intro" }}</p>
  <p class="tool-hint">{{ i18n "tool_privacy_note" }}</p>

  <div class="tool dfd-tool" id="dfd-tool">
    <div class="dfd-toolbar">
      <button type="button" class="ghost" data-add="entity">{{ i18n "dfd_add_entity" }}</button>
      <button type="button" class="ghost" data-add="process">{{ i18n "dfd_add_process" }}</button>
      <button type="button" class="ghost" data-add="store">{{ i18n "dfd_add_store" }}</button>
      <button type="button" class="ghost" data-add="boundary">{{ i18n "dfd_add_boundary" }}</button>
      <button type="button" class="ghost" id="dfd-connect-btn">{{ i18n "dfd_connect" }}</button>
      <button type="button" class="ghost" id="dfd-delete-btn">{{ i18n "dfd_delete" }}</button>
      <button type="button" class="ghost" id="dfd-clear-btn">{{ i18n "dfd_clear" }}</button>
      <button type="button" class="primary" id="dfd-analyze-btn">{{ i18n "dfd_analyze" }}</button>
    </div>
    <p class="tool-hint" id="dfd-status">{{ i18n "dfd_hint" }}</p>
    <svg id="dfd-canvas" class="dfd-canvas" viewBox="0 0 800 420" aria-label="DFD editor">
      <defs>
        <marker id="dfd-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0 0 L10 5 L0 10 z" fill="var(--gold-2)"></path>
        </marker>
      </defs>
      <g id="dfd-flows"></g>
      <g id="dfd-boundaries"></g>
      <g id="dfd-nodes"></g>
    </svg>
    <div id="dfd-result" class="tool-result" hidden>
      <div class="tool-actions">
        <button type="button" id="dfd-copy-btn" class="ghost" hidden data-label="{{ i18n "dfd_copy" }}" data-copied="{{ i18n "dfd_copied" }}">{{ i18n "dfd_copy" }}</button>
      </div>
      <h4>{{ i18n "dfd_result_label" }}</h4>
      <div id="dfd-groups" class="stride-groups"></div>
    </div>
  </div>
</section>

<script type="application/json" id="dfd-strings">
{
  "strideLabels": { "S": {{ i18n "stride_s" }}, "T": {{ i18n "stride_t" }}, "R": {{ i18n "stride_r" }}, "I": {{ i18n "stride_i" }}, "D": {{ i18n "stride_d" }}, "E": {{ i18n "stride_e" }} },
  "typeLabels": { "entity": {{ i18n "dfd_label_entity" }}, "process": {{ i18n "dfd_label_process" }}, "store": {{ i18n "dfd_label_store" }}, "boundary": {{ i18n "dfd_label_boundary" }}, "flow": {{ i18n "dfd_label_flow" }} },
  "prompts": {
    "entity": {{ i18n "dfd_prompt_entity" }},
    "process": {{ i18n "dfd_prompt_process" }},
    "store": {{ i18n "dfd_prompt_store" }},
    "boundary": {{ i18n "dfd_prompt_boundary" }},
    "flow": {{ i18n "dfd_prompt_flow" }}
  },
  "placingHint": {{ i18n "dfd_placing_hint" }},
  "connectHint": {{ i18n "dfd_connect_hint" }},
  "defaultHint": {{ i18n "dfd_hint" }},
  "emptyHint": {{ i18n "dfd_empty_hint" }},
  "confirmClear": {{ i18n "dfd_confirm_clear" }},
  "boundaryCross": {{ i18n "dfd_boundary_cross" }},
  "applicable": {
    "entity": ["S", "R"],
    "process": ["S", "T", "R", "I", "D", "E"],
    "store": ["T", "R", "I", "D"],
    "flow": ["T", "I", "D"]
  },
  "elementText": {
    "entity": { "S": {{ i18n "dfd_entity_s" }}, "R": {{ i18n "dfd_entity_r" }} },
    "process": { "S": {{ i18n "dfd_process_s" }}, "T": {{ i18n "dfd_process_t" }}, "R": {{ i18n "dfd_process_r" }}, "I": {{ i18n "dfd_process_i" }}, "D": {{ i18n "dfd_process_d" }}, "E": {{ i18n "dfd_process_e" }} },
    "store": { "T": {{ i18n "dfd_store_t" }}, "R": {{ i18n "dfd_store_r" }}, "I": {{ i18n "dfd_store_i" }}, "D": {{ i18n "dfd_store_d" }} },
    "flow": { "T": {{ i18n "dfd_flow_t" }}, "I": {{ i18n "dfd_flow_i" }}, "D": {{ i18n "dfd_flow_d" }} }
  }
}
</script>
{{ $js := resources.Get "js/threat-model.js" | fingerprint }}
<script type="module" src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}"></script>
{{ end }}
